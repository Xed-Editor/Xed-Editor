name: Build Clone APK (Xed PRO)

# Builds an installable, standalone "clone" APK (applicationId com.rk.xededitor.pro,
# label "Xed PRO") signed with the bundled testkey. It installs ALONGSIDE the official
# Xed-Editor instead of replacing it, and needs NO repository secrets, so it works on any
# fork. Download it from: Actions run -> Artifacts -> "Xed-PRO".

on:
  push:
    paths-ignore:
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

jobs:
  build-clone:
    name: Build Clone APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set commit hash
        run: echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Build clone APK
        run: ./gradlew assembleClone --no-daemon --stacktrace

      - name: Collect APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/clone/*.apk "out/xed-pro-${COMMIT_HASH}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: Xed-PRO
          path: out/*.apk
          if-no-files-found: error
