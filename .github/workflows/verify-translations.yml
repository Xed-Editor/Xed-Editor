name: Translation Safety Check

on:
  push:
    paths:
      - "**/strings.xml"

  pull_request:
    paths:
      - "**/strings.xml"

jobs:
  scan-translations:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Collect changed strings.xml diffs
        shell: bash
        run: |
          mkdir -p scan

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}"

            FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep 'strings.xml$' || true)

            for file in $FILES; do
              echo "Scanning $file"
              git diff origin/${{ github.base_ref }}...HEAD -- "$file" > "scan/$(basename "$file").diff"
            done
          else
            FILES=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep 'strings.xml$' || true)

            for file in $FILES; do
              echo "Scanning $file"
              git diff "${{ github.event.before }}" "${{ github.sha }}" -- "$file" > "scan/$(basename "$file").diff"
            done
          fi

      - name: Install Gemini SDK
        run: npm install @google/generative-ai

      - name: Run Gemini scan
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        shell: bash
        run: |
          cat <<'EOF' > scan.js
          const fs = require("fs");
          const path = require("path");
          const { GoogleGenerativeAI } = require("@google/generative-ai");

          const apiKey = process.env.GEMINI_API_KEY;

          if (!apiKey) {
            console.error("Missing GEMINI_API_KEY");
            process.exit(1);
          }

          const genAI = new GoogleGenerativeAI(apiKey);

          async function main() {
            const model = genAI.getGenerativeModel({
              model: "gemini-2.0-flash"
            });

            const scanDir = "./scan";

            if (!fs.existsSync(scanDir)) {
              console.log("No scan directory found");
              return;
            }

            const files = fs.readdirSync(scanDir);

            let failed = false;

            for (const file of files) {
              const fullPath = path.join(scanDir, file);
              const diff = fs.readFileSync(fullPath, "utf8");

              if (!diff.trim()) continue;

              const prompt = [
                "You are a translation moderation system.",
                "",
                "Analyze this Android strings.xml git diff.",
                "",
                "Check ONLY newly added or modified translations.",
                "",
                "Detect:",
                "- profanity",
                "- slurs",
                "- hate speech",
                "- sexual content",
                "- abusive language",
                "- offensive slang",
                "",
                "Ignore:",
                "- XML syntax",
                "- placeholders like %s or %d",
                "- harmless casual language",
                "",
                "Reply ONLY with:",
                "SAFE",
                "",
                "or",
                "",
                "UNSAFE: <reason>",
                "",
                "Git diff:",
                diff
              ].join("\n");

              const result = await model.generateContent(prompt);
              const text = result.response.text().trim();

              console.log("\\n=== " + file + " ===");
              console.log(text);

              if (!text.startsWith("SAFE")) {
                failed = true;
              }
            }

            if (failed) {
              console.error("\\nTranslation moderation failed.");
              process.exit(1);
            }

            console.log("\\nAll translations are safe.");
          }

          main().catch((err) => {
            console.error(err);
            process.exit(1);
          });
          EOF

          node scan.js
