name: Android Release CI

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Release version name (leave empty to auto-detect from build.gradle.kts)"
        required: false
        default: ""
      pre_release:
        description: "Mark as pre-release"
        type: boolean
        default: false

jobs:
  build-release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Initialize soraX editor engine
        run: bash .github/scripts/ensure-sorax.sh

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.KEYSTORE }}" ]; then
            echo "::error::Missing secret: KEYSTORE (base64-encoded keystore)"
            exit 1
          fi
          if [ -z "${{ secrets.PROP }}" ]; then
            echo "::error::Missing secret: PROP (base64-encoded signing.properties)"
            exit 1
          fi
          echo "All required secrets are present"

      - name: Decode and create secrets
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 -d > /tmp/xed.keystore
          echo "${{ secrets.PROP }}" | base64 -d > /tmp/signing.properties
          echo "Secrets decoded successfully"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Extract version from build.gradle.kts
        id: version
        run: |
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME=$(grep -E "^[[:space:]]*versionName" app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          fi
          VERSION_CODE=$(grep -E "^[[:space:]]*versionCode" app/build.gradle.kts | sed 's/.*=[[:space:]]*\([0-9]*\).*/\1/')
          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_name_sanitized=$SANITIZED_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "tag=v$SANITIZED_NAME" >> $GITHUB_OUTPUT

      - name: Build with Gradle
        run: |
          VERSION="${{ steps.version.outputs.version_name }}"
          ./gradlew assembleRelease --no-daemon
          mkdir -p app/dist
          cp app/build/outputs/apk/release/*.apk "app/dist/Xed-Editor-v${SANITIZED_NAME}.apk"

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "## Changelog" > /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md
          if [ -f changelog.txt ]; then
            cat changelog.txt >> /tmp/release-notes.md
            echo "" >> /tmp/release-notes.md
            echo "---" >> /tmp/release-notes.md
            echo "" >> /tmp/release-notes.md
          fi
          if [ -n "$PREV_TAG" ]; then
            git log "$PREV_TAG..HEAD" --oneline --no-decorate >> /tmp/release-notes.md || true
          else
            git log --oneline --no-decorate -20 >> /tmp/release-notes.md
          fi
          echo "" >> /tmp/release-notes.md
          echo "**Commit:** ${{ steps.version.outputs.commit_hash }}" >> /tmp/release-notes.md
          echo "**Version Code:** ${{ steps.version.outputs.version_code }}" >> /tmp/release-notes.md
          echo "**Pre-release:** ${{ github.event.inputs.pre_release }}" >> /tmp/release-notes.md

      - name: Archive APK
        uses: actions/upload-artifact@v7
        with:
          name: Xed-Editor-v${{ steps.version.outputs.version_name }}
          path: app/dist/*.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Xed-Editor v${{ steps.version.outputs.version_name }}
          body_path: /tmp/release-notes.md
          files: app/dist/*.apk
          prerelease: ${{ github.event.inputs.pre_release }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete secrets
        if: always()
        run: rm -f /tmp/xed.keystore /tmp/signing.properties
