name: Verify Reproducible Build

on:
  workflow_dispatch:
    inputs:
      reference_apk_url:
        description: 'URL of the official signed APK to compare against (optional)'
        required: false
        type: string
      git_ref:
        description: 'Commit hash, branch name, or tag to checkout and test (optional, defaults to triggering branch/commit)'
        required: false
        type: string
      build_type:
        description: 'Build type (release or debug)'
        required: true
        default: 'release'
        type: choice
        options:
          - 'release'
          - 'debug'

jobs:
  verify-reproducibility:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout target commit or branch
        run: |
          if [ -n "${{ github.event.inputs.git_ref }}" ]; then
            INPUT_REF="${{ github.event.inputs.git_ref }}"
            # Extract 40-char SHA if present at the end of the input (e.g. main/79ee0d60fff4f835bb31a5f64f5f0f6f4b30409a)
            CLEAN_REF=$(echo "$INPUT_REF" | grep -oE '[0-9a-f]{40}$' || echo "$INPUT_REF")
            echo "Checking out parsed ref: $CLEAN_REF"
            git checkout "$CLEAN_REF"
          fi

      - name: Detect NDK Version
        run: |
          # Dynamically extract NDK version from build files
          NDK_VERSION=$(grep -rnw . -e "ndkVersion" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || echo "29.0.13846066")
          echo "Detected NDK version: $NDK_VERSION"
          echo "NDK_VERSION=$NDK_VERSION" >> $GITHUB_ENV



      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup exact SDK versions (cmdline-tools, cmake, ndk)
        run: |
          # Set up permissions for SDK folder
          sudo chown -R $USER:$USER /usr/local/lib/android/sdk
          
          # Clean up any existing cmdline-tools 20.0 to avoid conflicts
          rm -rf /usr/local/lib/android/sdk/cmdline-tools/20.0
          
          # Download the exact version of cmdline-tools
          curl -L -o /tmp/cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-14742923_latest.zip
          echo "04453066b540409d975c676d781da1477479dde3761310f1a7eb92a1dfb15af7  /tmp/cmdline-tools.zip" | sha256sum -c -
          
          # Extract cmdline-tools
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-extracted
          mkdir -p /usr/local/lib/android/sdk/cmdline-tools
          mv /tmp/cmdline-tools-extracted/cmdline-tools /usr/local/lib/android/sdk/cmdline-tools/20.0
          
          # Accept licenses using the new sdkmanager
          yes | /usr/local/lib/android/sdk/cmdline-tools/20.0/bin/sdkmanager --sdk_root=/usr/local/lib/android/sdk --licenses
          
          # Install the exact cmake and dynamically detected ndk version
          echo "Installing NDK version: $NDK_VERSION"
          /usr/local/lib/android/sdk/cmdline-tools/20.0/bin/sdkmanager --sdk_root=/usr/local/lib/android/sdk \
            "cmake;4.1.2" \
            "ndk;$NDK_VERSION"



      - name: Install System Dependencies & JDK 21 (APT)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            apksigner dexdump diffoscope openjdk-21-jdk-headless
          echo "JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64" >> $GITHUB_ENV


      - name: Install Python Tools
        run: |
          python3 -m pip install --upgrade pip
          pip install apksigcopier git+https://github.com/obfusk/reproducible-apk-tools.git

      - name: Install apkdiff utility
        run: |
          cat << 'EOF' > /tmp/apkdiff
          #!/usr/bin/env python3
          import sys
          import os
          import zipfile
          import hashlib

          def get_files_and_hashes(apk_path):
              files = {}
              with zipfile.ZipFile(apk_path, 'r') as z:
                  for name in z.namelist():
                      if name.startswith('META-INF/'):
                          continue
                      try:
                          data = z.read(name)
                          h = hashlib.sha256(data).hexdigest()
                          files[name] = (len(data), h)
                      except Exception as e:
                          print(f"Warning: Could not read {name} in {apk_path}: {e}")
              return files

          def main():
              if len(sys.argv) < 3:
                  print("Usage: apkdiff <apk1> <apk2>")
                  sys.exit(1)
                  
              apk1, apk2 = sys.argv[1], sys.argv[2]
              
              if not os.path.exists(apk1) or not os.path.exists(apk2):
                  print(f"Error: One of the files does not exist. {apk1} or {apk2}")
                  sys.exit(1)
                  
              files1 = get_files_and_hashes(apk1)
              files2 = get_files_and_hashes(apk2)
              
              all_names = sorted(list(set(files1.keys()) | set(files2.keys())))
              
              mismatches = 0
              only_in_1 = []
              only_in_2 = []
              diff_hash = []
              
              for name in all_names:
                  in1 = name in files1
                  in2 = name in files2
                  
                  if in1 and not in2:
                      only_in_1.append(name)
                      mismatches += 1
                  elif in2 and not in1:
                      only_in_2.append(name)
                      mismatches += 1
                  else:
                      len1, h1 = files1[name]
                      len2, h2 = files2[name]
                      if h1 != h2:
                          diff_hash.append((name, len1, len2, h1[:8], h2[:8]))
                          mismatches += 1
                          
              if mismatches == 0:
                  print("APK contents (excluding META-INF signatures) are identical!")
                  sys.exit(0)
                  
              print(f"Found {mismatches} differences between APKs (excluding META-INF signatures):")
              
              if only_in_1:
                  print("\nFiles only in APK 1:")
                  for name in only_in_1:
                      print(f"  - {name}")
                      
              if only_in_2:
                  print("\nFiles only in APK 2:")
                  for name in only_in_2:
                      print(f"  - {name}")
                      
              if diff_hash:
                  print("\nModified files (name: size1 vs size2, sha256_1 vs sha256_2):")
                  for name, size1, size2, h1, h2 in diff_hash:
                      print(f"  - {name}: {size1} vs {size2} bytes, {h1} vs {h2}")
                      
              sys.exit(1)

          if __name__ == '__main__':
              main()
          EOF
          sudo cp /tmp/apkdiff /usr/local/bin/apkdiff
          sudo chmod +x /usr/local/bin/apkdiff



      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clone submodules
        run: git submodule update --init --recursive

      - name: Build First APK
        run: |
          sed -r '/(foojay|toolchainVendor)/d' -i gradle/gradle-daemon-jvm.properties || true
          sed -ri '/foojay-resolver-convention/d' settings.gradle.kts || true
          sed -r '/signingConfigs.getByName/d' -i app/build.gradle.kts || true
          
          # Configure exact NDK location dynamically
          export ANDROID_NDK=/usr/local/lib/android/sdk/ndk/$NDK_VERSION
          echo "ndk.dir=${ANDROID_NDK}" >> local.properties
          
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            ./gradlew assembleRelease --no-daemon
            find app/build/outputs/apk/release/ -name "*.apk" -exec cp {} /tmp/build1.apk \;
          else
            ./gradlew assembleDebug --no-daemon
            find app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} /tmp/build1.apk \;
          fi
          echo "First built APK size: $(wc -c < /tmp/build1.apk) bytes"



      - name: Check if Reference APK provided
        id: ref_check
        run: |
          if [ -n "${{ github.event.inputs.reference_apk_url }}" ]; then
            echo "has_ref=true" >> $GITHUB_OUTPUT
          else
            echo "has_ref=false" >> $GITHUB_OUTPUT
          fi

      - name: Download Reference APK
        if: steps.ref_check.outputs.has_ref == 'true'
        run: |
          curl -L -o /tmp/reference.apk "${{ github.event.inputs.reference_apk_url }}"
          echo "Reference APK size: $(wc -c < /tmp/reference.apk) bytes"

      - name: Verify Reproducibility against Reference APK
        if: steps.ref_check.outputs.has_ref == 'true'
        run: |
          # Copy the signature from the reference APK to our built APK
          if apksigcopier copy /tmp/reference.apk /tmp/build1.apk /tmp/reproduced.apk; then
            echo "Successfully copied signature using apksigcopier!"
            
            # Calculate SHA256 checksums
            REF_SHA=$(sha256sum /tmp/reference.apk | cut -d' ' -f1)
            REP_SHA=$(sha256sum /tmp/reproduced.apk | cut -d' ' -f1)
            
            echo "Reference SHA256:  $REF_SHA"
            echo "Reproduced SHA256: $REP_SHA"
            
            if [ "$REF_SHA" = "$REP_SHA" ]; then
              echo "=== SUCCESS: Build is 100% reproducible! ==="
            else
              echo "=== FAILURE: APK contents differ after signature copying. ==="
              echo "Running apkdiff for details..."
              apkdiff /tmp/reference.apk /tmp/reproduced.apk || true
              echo "Running diffoscope for details..."
              mkdir -p diffoscope-report
              diffoscope --html diffoscope-report/index.html /tmp/reference.apk /tmp/reproduced.apk || true
              exit 1
            fi
          else
            echo "=== FAILURE: apksigcopier failed to copy the signature. ==="
            echo "This usually means the files inside the APKs are structured differently."
            echo "Running apkdiff between reference and built APK..."
            apkdiff /tmp/reference.apk /tmp/build1.apk || true
            echo "Running diffoscope between reference and built APK..."
            mkdir -p diffoscope-report
            diffoscope --html diffoscope-report/index.html /tmp/reference.apk /tmp/build1.apk || true
            exit 1
          fi



      - name: Check local determinism (Build twice and compare)
        if: steps.ref_check.outputs.has_ref == 'false'
        run: |
          echo "No reference APK provided. Checking local build determinism by building a second time..."
          ./gradlew clean
          
          # Configure exact NDK location dynamically
          export ANDROID_NDK=/usr/local/lib/android/sdk/ndk/$NDK_VERSION
          echo "ndk.dir=${ANDROID_NDK}" >> local.properties
          
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            ./gradlew assembleRelease --no-daemon
            find app/build/outputs/apk/release/ -name "*.apk" -exec cp {} /tmp/build2.apk \;
          else
            ./gradlew assembleDebug --no-daemon
            find app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} /tmp/build2.apk \;
          fi

          
          SHA1=$(sha256sum /tmp/build1.apk | cut -d' ' -f1)
          SHA2=$(sha256sum /tmp/build2.apk | cut -d' ' -f1)
          
          echo "First Build SHA256:  $SHA1"
          echo "Second Build SHA256: $SHA2"
          
          if [ "$SHA1" = "$SHA2" ]; then
            echo "=== SUCCESS: Local builds are 100% deterministic! ==="
          else
            echo "=== FAILURE: Local builds differ. ==="
            echo "Running apkdiff..."
            apkdiff /tmp/build1.apk /tmp/build2.apk || true
            echo "Running diffoscope..."
            mkdir -p diffoscope-report
            diffoscope --html diffoscope-report/index.html /tmp/build1.apk /tmp/build2.apk || true
            exit 1
          fi

      - name: Upload Diffoscope Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: diffoscope-report
          path: diffoscope-report/

