name: Build Debug APK

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches:
      - main
      - dev
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Initialize soraX editor engine
        run: bash .github/scripts/ensure-sorax.sh

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename debug APK
        run: |
          COMMIT_HASH="$(git rev-parse --short HEAD)"
          mkdir -p app/build/outputs/apk/upload
          cp app/build/outputs/apk/debug/*.apk "app/build/outputs/apk/upload/xed-editor-debug-${COMMIT_HASH}.apk"

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: Xed-Editor-Debug-APK
          path: app/build/outputs/apk/upload/*.apk
          if-no-files-found: error
          retention-days: 14
