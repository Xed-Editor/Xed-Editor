name: Kotlin format (ktfmt)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ktfmt:
    name: Run ktfmt without committing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run ktfmt
        run: ./gradlew ktfmtFormat --no-daemon

      - name: Show formatting changes, if any
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "ktfmt would change these files:"
            git status --short
            git diff --stat
          else
            echo "No formatting changes."
          fi
